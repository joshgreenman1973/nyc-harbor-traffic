name: record-vessels
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min (GitHub may delay under load)
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: record
  cancel-in-progress: false
jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }   # Node 22 has a stable global WebSocket
      - name: Snapshot vessels
        run: node recorder/poll.mjs
      - name: Commit log
        run: |
          git config user.name "harbor-recorder"
          git config user.email "actions@users.noreply.github.com"
          git add data/recent
          git diff --staged --quiet || git commit -m "log vessels $(date -u +%FT%TZ)"
          git pull --rebase --autostash || true
          git push
